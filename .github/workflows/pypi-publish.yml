name: Publish ImCurvin to PyPI

on:
  push:
    branches:
      - main  
    paths:
      - 'setup.py'  # Workflow HANYA terpicu jika file setup.py berubah

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Wajib diisi agar git diff bisa membandingkan commit sekarang dengan sebelumnya

      - name: Check if version variable changed
        id: check_version
        run: |
          if git diff HEAD^ HEAD setup.py | grep -E "^\+[[:space:]]*version[[:space:]]*="; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "Perubahan versi terdeteksi. Melanjutkan proses publish..."
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "File setup.py berubah, tetapi variabel 'version' tidak diganti. Membatalkan publish."
          fi

      - name: Set up Python
        if: steps.check_version.outputs.version_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        if: steps.check_version.outputs.version_changed == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_version.outputs.version_changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1